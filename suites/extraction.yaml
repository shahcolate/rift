name: structured_extraction
description: Extract structured data from messy real-world text inputs
scoring: exact_match
model_params:
  temperature: 0
cases:
  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      Invoice #4521, issued January 15, 2025, total amount $1,240.00 payable to Acme Corp.
    expected:
      invoice_number: "4521"
      date: "2025-01-15"
      total: 1240.00
      recipient: "Acme Corp"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      INV-2024-0087 | Date: 03/22/2024 | Amount Due: EUR 5,300.50 | Billed To: Globex International Ltd.
    expected:
      invoice_number: "INV-2024-0087"
      date: "2024-03-22"
      total: 5300.50
      recipient: "Globex International Ltd."

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      Reference: 99102
      To: Martinez & Sons LLC
      Inv. Date: Dec 1 2023
      Balance: $420
    expected:
      invoice_number: "99102"
      date: "2023-12-01"
      total: 420
      recipient: "Martinez & Sons LLC"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      INVOICE
      Number: A-10244
      Client: Northwind Traders Inc
      Issue Date: 2024-07-30
      Grand Total (incl. tax): USD 12,750.00
    expected:
      invoice_number: "A-10244"
      date: "2024-07-30"
      total: 12750.00
      recipient: "Northwind Traders Inc"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      inv no 33219, billed 8/15/24 to Riverside Medical Group for $890.25
    expected:
      invoice_number: "33219"
      date: "2024-08-15"
      total: 890.25
      recipient: "Riverside Medical Group"

  - input: |
      Extract the following fields as JSON: name, email, phone, company.

      Hi, I'm Jordan Lee from Pinnacle Systems. You can reach me at jordan.lee@pinnaclesys.com or (415) 555-0198.
    expected:
      name: "Jordan Lee"
      email: "jordan.lee@pinnaclesys.com"
      phone: "(415) 555-0198"
      company: "Pinnacle Systems"

  - input: |
      Extract the following fields as JSON: name, email, phone, company.

      Contact: Dr. Priya Sharma, PhD
      Organization: BioVenture Labs
      Email: p.sharma@bioventlabs.org
      Tel: +44 20 7946 0958
    expected:
      name: "Dr. Priya Sharma"
      email: "p.sharma@bioventlabs.org"
      phone: "+44 20 7946 0958"
      company: "BioVenture Labs"

  - input: |
      Extract the following fields as JSON: product, quantity, unit_price, currency.

      Order line: 500 units of Widget Pro X at $12.99 each
    expected:
      product: "Widget Pro X"
      quantity: 500
      unit_price: 12.99
      currency: "USD"

  - input: |
      Extract the following fields as JSON: product, quantity, unit_price, currency.

      Item: Enterprise License (Annual), Qty: 25 seats, Price per seat: EUR 199.00
    expected:
      product: "Enterprise License (Annual)"
      quantity: 25
      unit_price: 199.00
      currency: "EUR"

  - input: |
      Extract the following fields as JSON: event, date (ISO format), location, organizer.

      You're invited to the 2024 Global AI Summit hosted by TechForward Foundation, taking place November 14-16, 2024 at the Moscone Center, San Francisco.
    expected:
      event: "2024 Global AI Summit"
      date: "2024-11-14"
      location: "Moscone Center, San Francisco"
      organizer: "TechForward Foundation"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      Bill to Hawthorne Dental - invoice 2024/Q3/0117, issued on the 5th of September 2024, $2,015.75 due net 30.
    expected:
      invoice_number: "2024/Q3/0117"
      date: "2024-09-05"
      total: 2015.75
      recipient: "Hawthorne Dental"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      Recipient: Blackwood Architects, LLP
      Ref #: BW-0471-A
      Dated: 11 February 2025
      Payable: £8,940.00
    expected:
      invoice_number: "BW-0471-A"
      date: "2025-02-11"
      total: 8940.00
      recipient: "Blackwood Architects, LLP"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      Invoice no: 7781
      Client: Oak & Sons Landscaping
      Service date: 2024-06-09
      Amount: $312.40 (includes 8% tax)
    expected:
      invoice_number: "7781"
      date: "2024-06-09"
      total: 312.40
      recipient: "Oak & Sons Landscaping"

  - input: |
      Extract the following fields as JSON: invoice_number, date (ISO format), total (number), recipient.

      From Harper Design Studio: please remit $480 for inv #H-2024-55, sent 4/1/2024, to Summit Realty Group.
    expected:
      invoice_number: "H-2024-55"
      date: "2024-04-01"
      total: 480
      recipient: "Summit Realty Group"

  - input: |
      Extract the following fields as JSON: name, email, phone, company.

      Please add to your records:
      Miguel Ortiz-Ramirez | Director of Engineering | Vertex Robotics
      miguel.o@vertexrobotics.ai · +1-512-555-7734
    expected:
      name: "Miguel Ortiz-Ramirez"
      email: "miguel.o@vertexrobotics.ai"
      phone: "+1-512-555-7734"
      company: "Vertex Robotics"

  - input: |
      Extract the following fields as JSON: name, email, phone, company.

      Hey — this is Anne-Sophie Bernard calling on behalf of Clairmont & Vincent. Best number is 020 7946 1122 and you can email me at as.bernard@clairmontvincent.co.uk.
    expected:
      name: "Anne-Sophie Bernard"
      email: "as.bernard@clairmontvincent.co.uk"
      phone: "020 7946 1122"
      company: "Clairmont & Vincent"

  - input: |
      Extract the following fields as JSON: name, email, phone, company.

      Contact card:
      --------------
      Tomoko Yamamoto
      Head of Research, Midori Biotech K.K.
      t.yamamoto@midori-bio.jp
      +81 3-1234-5678
    expected:
      name: "Tomoko Yamamoto"
      email: "t.yamamoto@midori-bio.jp"
      phone: "+81 3-1234-5678"
      company: "Midori Biotech K.K."

  - input: |
      Extract the following fields as JSON: product, quantity, unit_price, currency.

      PO line 3: 12x "Titanium Bolt M8x40" @ GBP 3.75 ea.
    expected:
      product: "Titanium Bolt M8x40"
      quantity: 12
      unit_price: 3.75
      currency: "GBP"

  - input: |
      Extract the following fields as JSON: product, quantity, unit_price, currency.

      Ordered 1,000 bottles of Cold Brew Concentrate (1L) at ¥620 per bottle.
    expected:
      product: "Cold Brew Concentrate (1L)"
      quantity: 1000
      unit_price: 620
      currency: "JPY"

  - input: |
      Extract the following fields as JSON: product, quantity, unit_price, currency.

      Item line: 3 units of "Studio Monitor Pair - 5\"" for CAD 429.00 each.
    expected:
      product: "Studio Monitor Pair - 5\""
      quantity: 3
      unit_price: 429.00
      currency: "CAD"

  - input: |
      Extract the following fields as JSON: event, date (ISO format), location, organizer.

      Save the date: PyData Berlin 2024, organized by NumFOCUS, will run April 22-24, 2024 at bcc Berlin Congress Center.
    expected:
      event: "PyData Berlin 2024"
      date: "2024-04-22"
      location: "bcc Berlin Congress Center"
      organizer: "NumFOCUS"

  - input: |
      Extract the following fields as JSON: event, date (ISO format), location, organizer.

      The North Coast Jazz Festival (presented by the Cleveland Arts Council) returns August 2nd through 4th, 2024 on the shores of Lake Erie at Edgewater Park.
    expected:
      event: "North Coast Jazz Festival"
      date: "2024-08-02"
      location: "Edgewater Park"
      organizer: "Cleveland Arts Council"

  - input: |
      Extract the following fields as JSON: street, city, state, postal_code, country.

      Ship to: 4412 Magnolia Blvd Apt 3B, Nashville, TN 37205, United States
    expected:
      street: "4412 Magnolia Blvd Apt 3B"
      city: "Nashville"
      state: "TN"
      postal_code: "37205"
      country: "United States"

  - input: |
      Extract the following fields as JSON: street, city, state, postal_code, country.

      Address on file:
        12 Rue de Rivoli
        75001 Paris
        France
    expected:
      street: "12 Rue de Rivoli"
      city: "Paris"
      state: ""
      postal_code: "75001"
      country: "France"

  - input: |
      Extract the following fields as JSON: patient, medication, dosage, refills (number).

      Rx for J. Patel: Amoxicillin 500mg, one capsule every 8 hours. 2 refills remaining.
    expected:
      patient: "J. Patel"
      medication: "Amoxicillin"
      dosage: "500mg"
      refills: 2

  - input: |
      Extract the following fields as JSON: flight, departure, arrival, date (ISO format).

      Booking confirmed: UA 2287, SFO → ORD, departing Tuesday, March 4 2025.
    expected:
      flight: "UA 2287"
      departure: "SFO"
      arrival: "ORD"
      date: "2025-03-04"

  - input: |
      Extract the following fields as JSON: job_title, company, location, salary_max (number).

      Now hiring: Senior Platform Engineer at Lumen Analytics (remote within EU), up to €95,000 per year.
    expected:
      job_title: "Senior Platform Engineer"
      company: "Lumen Analytics"
      location: "remote within EU"
      salary_max: 95000

  - input: |
      Extract the following fields as JSON: sender, recipient, amount (number), currency.

      Transfer complete: Elena Rossi sent AU$1,450.00 to The Green Pantry Pty Ltd on 10 Oct 2024.
    expected:
      sender: "Elena Rossi"
      recipient: "The Green Pantry Pty Ltd"
      amount: 1450.00
      currency: "AUD"

  - input: |
      Extract the following fields as JSON: title, author, isbn, pages (number).

      "The Long Coastline" by R. Nakamura — ISBN 978-0-19-912345-6, 382 pages, Oxford University Press.
    expected:
      title: "The Long Coastline"
      author: "R. Nakamura"
      isbn: "978-0-19-912345-6"
      pages: 382
